name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test -v -coverprofile=coverage.out ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o corslens-bin ./cmd/corslens/
